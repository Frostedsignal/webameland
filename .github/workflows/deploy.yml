name: Fetch WordPress Pages

on:
  workflow_dispatch:

jobs:
  fetch-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch all pages from WordPress
        env:
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          mkdir -p pages

          page=1
          while true; do
            if ! response=$(curl -sf \
              --user "$WP_USER:$WP_APP_PASSWORD" \
              "https://www.relaxenopameland.nl/wp-json/wp/v2/pages?per_page=100&page=$page"); then
              if [ "$page" -gt 1 ]; then
                echo "No more pages at page $page (API returned error). Done."
                break
              fi
              echo "Failed to fetch pages from API (page $page)"
              exit 1
            fi

            if ! count=$(echo "$response" | jq 'length'); then
              echo "Failed to parse API response on page $page"
              exit 1
            fi

            if [ "$count" -eq 0 ]; then
              echo "No more pages at page $page. Done."
              break
            fi

            echo "Fetched $count pages from API page $page"

            tmpfile=$(mktemp)
            echo "$response" | jq -c '.[]' > "$tmpfile"
            while IFS= read -r item; do
              slug=$(echo "$item" | jq -r '.slug')
              if [[ ! "$slug" =~ ^[a-z0-9-]+$ ]]; then
                echo "Skipping invalid slug: $slug"
                continue
              fi
              echo "$item" | jq '.' > "pages/${slug}.json"
              echo "Saved pages/${slug}.json"
            done < "$tmpfile"
            rm "$tmpfile"

            page=$((page + 1))
          done

      - name: Commit and push JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pages/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update WordPress page exports"
            git push
          fi
